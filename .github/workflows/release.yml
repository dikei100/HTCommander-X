name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '9.0.x'

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libfuse2 imagemagick wget rpm libarchive-tools zstd
          sudo gem install fpm

      - name: Publish Linux x64
        run: |
          dotnet publish HTCommander.Desktop/HTCommander.Desktop.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=false \
            -p:PublishTrimmed=false \
            -o publish/linux-x64

      - name: Publish Windows x64
        run: |
          dotnet publish HTCommander.Desktop/HTCommander.Desktop.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=false \
            -p:PublishTrimmed=false \
            -p:EnableWindowsTargeting=true \
            -o publish/win-x64

      - name: Build AppImage
        run: |
          APPDIR=AppDir
          mkdir -p $APPDIR/usr/bin
          mkdir -p $APPDIR/usr/share/applications
          mkdir -p $APPDIR/usr/share/icons/hicolor/256x256/apps

          cp -r publish/linux-x64/* $APPDIR/usr/bin/

          cp packaging/linux/HTCommander.desktop $APPDIR/usr/share/applications/
          cp packaging/linux/HTCommander.desktop $APPDIR/

          convert assets/HTCommander.ico[0] -resize 256x256 $APPDIR/usr/share/icons/hicolor/256x256/apps/htcommander.png
          cp $APPDIR/usr/share/icons/hicolor/256x256/apps/htcommander.png $APPDIR/htcommander.png
          cp $APPDIR/usr/share/icons/hicolor/256x256/apps/htcommander.png $APPDIR/.DirIcon

          printf '#!/bin/bash\nSELF=$(readlink -f "$0")\nHERE=${SELF%%/*}\nexport PATH="${HERE}/usr/bin:${PATH}"\nexport LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"\nexec "${HERE}/usr/bin/HTCommander.Desktop" "$@"\n' > $APPDIR/AppRun
          chmod +x $APPDIR/AppRun

          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          ARCH=x86_64 ./appimagetool-x86_64.AppImage $APPDIR HTCommander-X-x86_64.AppImage

      - name: Build .deb
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DEBDIR="htcommander_${VERSION}_amd64"

          mkdir -p $DEBDIR/opt/htcommander
          mkdir -p $DEBDIR/DEBIAN
          mkdir -p $DEBDIR/usr/bin
          mkdir -p $DEBDIR/usr/share/applications
          mkdir -p $DEBDIR/usr/share/icons/hicolor/256x256/apps

          cp -r publish/linux-x64/* $DEBDIR/opt/htcommander/

          cat > $DEBDIR/DEBIAN/control << 'CTRL'
          Package: htcommander
          Section: hamradio
          Priority: optional
          Architecture: amd64
          Depends: libportaudio2, bluez
          Recommends: espeak-ng
          Maintainer: HTCommander-X
          Description: HTCommander-X - Cross-platform Ham Radio Commander
           HTCommander-X is a cross-platform application for controlling
           Bluetooth-enabled ham radio handhelds. Supports UV-PRO, VR-N75,
           VR-N76, VR-N7500, and other compatible radios.
          Homepage: https://github.com/dikei100/HTCommander-X
          CTRL
          sed -i 's/^          //' $DEBDIR/DEBIAN/control
          sed -i "2i Version: ${VERSION}" $DEBDIR/DEBIAN/control

          printf '#!/bin/bash\nexec /opt/htcommander/HTCommander.Desktop "$@"\n' > $DEBDIR/usr/bin/htcommander
          chmod +x $DEBDIR/usr/bin/htcommander

          cp packaging/linux/HTCommander.desktop $DEBDIR/usr/share/applications/
          sed -i "s|Exec=HTCommander.Desktop|Exec=/opt/htcommander/HTCommander.Desktop|" \
              $DEBDIR/usr/share/applications/HTCommander.desktop

          if [ -f AppDir/usr/share/icons/hicolor/256x256/apps/htcommander.png ]; then
            cp AppDir/usr/share/icons/hicolor/256x256/apps/htcommander.png \
              $DEBDIR/usr/share/icons/hicolor/256x256/apps/
          fi

          dpkg-deb --build $DEBDIR "htcommander_${VERSION}_amd64.deb"

      - name: Build .rpm (Fedora)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          RPMROOT=rpm-staging
          mkdir -p $RPMROOT/opt/htcommander
          mkdir -p $RPMROOT/usr/bin
          mkdir -p $RPMROOT/usr/share/applications
          mkdir -p $RPMROOT/usr/share/icons/hicolor/256x256/apps

          cp -r publish/linux-x64/* $RPMROOT/opt/htcommander/
          printf '#!/bin/bash\nexec /opt/htcommander/HTCommander.Desktop "$@"\n' > $RPMROOT/usr/bin/htcommander
          chmod +x $RPMROOT/usr/bin/htcommander

          cp packaging/linux/HTCommander.desktop $RPMROOT/usr/share/applications/
          sed -i "s|Exec=HTCommander.Desktop|Exec=/opt/htcommander/HTCommander.Desktop|" \
              $RPMROOT/usr/share/applications/HTCommander.desktop

          if [ -f AppDir/usr/share/icons/hicolor/256x256/apps/htcommander.png ]; then
            cp AppDir/usr/share/icons/hicolor/256x256/apps/htcommander.png \
              $RPMROOT/usr/share/icons/hicolor/256x256/apps/
          fi

          fpm -s dir -t rpm \
            -n htcommander \
            -v "$VERSION" \
            -a x86_64 \
            --description "HTCommander-X - Cross-platform Ham Radio Commander" \
            --url "https://github.com/dikei100/HTCommander-X" \
            --license "Apache-2.0" \
            --depends portaudio \
            --depends bluez \
            -C $RPMROOT \
            -p "htcommander-${VERSION}-1.x86_64.rpm"

      - name: Build .pkg.tar.zst (Arch)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          ARCHROOT=arch-staging
          mkdir -p $ARCHROOT/opt/htcommander
          mkdir -p $ARCHROOT/usr/bin
          mkdir -p $ARCHROOT/usr/share/applications
          mkdir -p $ARCHROOT/usr/share/icons/hicolor/256x256/apps

          cp -r publish/linux-x64/* $ARCHROOT/opt/htcommander/
          printf '#!/bin/bash\nexec /opt/htcommander/HTCommander.Desktop "$@"\n' > $ARCHROOT/usr/bin/htcommander
          chmod +x $ARCHROOT/usr/bin/htcommander

          cp packaging/linux/HTCommander.desktop $ARCHROOT/usr/share/applications/
          sed -i "s|Exec=HTCommander.Desktop|Exec=/opt/htcommander/HTCommander.Desktop|" \
              $ARCHROOT/usr/share/applications/HTCommander.desktop

          if [ -f AppDir/usr/share/icons/hicolor/256x256/apps/htcommander.png ]; then
            cp AppDir/usr/share/icons/hicolor/256x256/apps/htcommander.png \
              $ARCHROOT/usr/share/icons/hicolor/256x256/apps/
          fi

          fpm -s dir -t pacman \
            -n htcommander \
            -v "$VERSION" \
            -a x86_64 \
            --description "HTCommander-X - Cross-platform Ham Radio Commander" \
            --url "https://github.com/dikei100/HTCommander-X" \
            --license "Apache-2.0" \
            --depends portaudio \
            --depends bluez \
            -C $ARCHROOT \
            -p "htcommander-${VERSION}-1-x86_64.pkg.tar.zst"

      - name: Create Windows zip
        run: cd publish/win-x64 && zip -r ../../HTCommander-X-win-x64.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          generate_release_notes: true
          files: |
            HTCommander-X-x86_64.AppImage
            htcommander_*.deb
            htcommander-*.rpm
            htcommander-*.pkg.tar.zst
            HTCommander-X-win-x64.zip
