name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Flutter
        uses: subosito/flutter-action@e938fdf56512cc96ef2f93601a5a40bde3801046 # v2.19.0
        with:
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            ninja-build gcc g++ cmake pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libfuse2 imagemagick wget rpm libarchive-tools zstd
          sudo gem install fpm -v 1.15.1

      - name: Build Linux release
        working-directory: htcommander_flutter
        run: |
          flutter pub get
          flutter build linux --release

      - name: Build AppImage
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUNDLE="htcommander_flutter/build/linux/x64/release/bundle"
          APPDIR=AppDir

          mkdir -p $APPDIR/usr/bin
          mkdir -p $APPDIR/usr/lib
          mkdir -p $APPDIR/usr/share/applications
          mkdir -p $APPDIR/usr/share/icons/hicolor/256x256/apps

          cp -r $BUNDLE/* $APPDIR/usr/bin/

          cat > $APPDIR/usr/share/applications/HTCommander.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=HTCommander-X
          Comment=Cross-platform Ham Radio Commander
          Exec=htcommander-x
          Icon=htcommander
          Terminal=false
          Type=Application
          Categories=HamRadio;Network;
          DESKTOP
          sed -i 's/^          //' $APPDIR/usr/share/applications/HTCommander.desktop
          cp $APPDIR/usr/share/applications/HTCommander.desktop $APPDIR/

          convert assets/HTCommander.ico[0] -resize 256x256 $APPDIR/usr/share/icons/hicolor/256x256/apps/htcommander.png
          cp $APPDIR/usr/share/icons/hicolor/256x256/apps/htcommander.png $APPDIR/htcommander.png
          cp $APPDIR/usr/share/icons/hicolor/256x256/apps/htcommander.png $APPDIR/.DirIcon

          printf '#!/bin/bash\nSELF=$(readlink -f "$0")\nHERE=${SELF%%/*}\nexport PATH="${HERE}/usr/bin:${PATH}"\nexport LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"\nexec "${HERE}/usr/bin/htcommander-x" "$@"\n' > $APPDIR/AppRun
          chmod +x $APPDIR/AppRun

          APPIMAGETOOL_URL="https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-x86_64.AppImage"
          APPIMAGETOOL_SHA256="ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0"
          wget -q "$APPIMAGETOOL_URL" -O appimagetool-x86_64.AppImage
          echo "$APPIMAGETOOL_SHA256  appimagetool-x86_64.AppImage" | sha256sum -c -
          chmod +x appimagetool-x86_64.AppImage

          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run $APPDIR HTCommander-X-x86_64.AppImage

      - name: Build .deb
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUNDLE="htcommander_flutter/build/linux/x64/release/bundle"
          DEBDIR="htcommander_${VERSION}_amd64"

          mkdir -p $DEBDIR/opt/htcommander
          mkdir -p $DEBDIR/DEBIAN
          mkdir -p $DEBDIR/usr/bin
          mkdir -p $DEBDIR/usr/share/applications
          mkdir -p $DEBDIR/usr/share/icons/hicolor/256x256/apps

          cp -r $BUNDLE/* $DEBDIR/opt/htcommander/

          cat > $DEBDIR/DEBIAN/control << CTRL
          Package: htcommander
          Version: ${VERSION}
          Section: hamradio
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0, bluez
          Recommends: espeak-ng
          Maintainer: HTCommander-X
          Description: HTCommander-X - Cross-platform Ham Radio Commander
           HTCommander-X is a cross-platform application for controlling
           Bluetooth-enabled ham radio handhelds. Supports UV-PRO, VR-N75,
           VR-N76, VR-N7500, and other compatible radios.
          Homepage: https://github.com/dikei100/HTCommander-X
          CTRL
          sed -i 's/^          //' $DEBDIR/DEBIAN/control

          printf '#!/bin/bash\nexec /opt/htcommander/htcommander-x "$@"\n' > $DEBDIR/usr/bin/htcommander
          chmod +x $DEBDIR/usr/bin/htcommander

          cat > $DEBDIR/usr/share/applications/HTCommander.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=HTCommander-X
          Comment=Cross-platform Ham Radio Commander
          Exec=/opt/htcommander/htcommander-x
          Icon=htcommander
          Terminal=false
          Type=Application
          Categories=HamRadio;Network;
          DESKTOP
          sed -i 's/^          //' $DEBDIR/usr/share/applications/HTCommander.desktop

          if [ -f AppDir/usr/share/icons/hicolor/256x256/apps/htcommander.png ]; then
            cp AppDir/usr/share/icons/hicolor/256x256/apps/htcommander.png \
              $DEBDIR/usr/share/icons/hicolor/256x256/apps/
          fi

          dpkg-deb --build $DEBDIR "htcommander_${VERSION}_amd64.deb"

      - name: Build .rpm (Fedora)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUNDLE="htcommander_flutter/build/linux/x64/release/bundle"

          RPMROOT=rpm-staging
          mkdir -p $RPMROOT/opt/htcommander
          mkdir -p $RPMROOT/usr/bin
          mkdir -p $RPMROOT/usr/share/applications
          mkdir -p $RPMROOT/usr/share/icons/hicolor/256x256/apps

          cp -r $BUNDLE/* $RPMROOT/opt/htcommander/
          printf '#!/bin/bash\nexec /opt/htcommander/htcommander-x "$@"\n' > $RPMROOT/usr/bin/htcommander
          chmod +x $RPMROOT/usr/bin/htcommander

          cat > $RPMROOT/usr/share/applications/HTCommander.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=HTCommander-X
          Comment=Cross-platform Ham Radio Commander
          Exec=/opt/htcommander/htcommander-x
          Icon=htcommander
          Terminal=false
          Type=Application
          Categories=HamRadio;Network;
          DESKTOP
          sed -i 's/^          //' $RPMROOT/usr/share/applications/HTCommander.desktop

          if [ -f AppDir/usr/share/icons/hicolor/256x256/apps/htcommander.png ]; then
            cp AppDir/usr/share/icons/hicolor/256x256/apps/htcommander.png \
              $RPMROOT/usr/share/icons/hicolor/256x256/apps/
          fi

          fpm -s dir -t rpm \
            -n htcommander \
            -v "$VERSION" \
            -a x86_64 \
            --description "HTCommander-X - Cross-platform Ham Radio Commander" \
            --url "https://github.com/dikei100/HTCommander-X" \
            --license "Apache-2.0" \
            --depends gtk3 \
            --depends bluez \
            -C $RPMROOT \
            -p "htcommander-${VERSION}-1.x86_64.rpm"

      - name: Build .pkg.tar.zst (Arch)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUNDLE="htcommander_flutter/build/linux/x64/release/bundle"

          ARCHROOT=arch-staging
          mkdir -p $ARCHROOT/opt/htcommander
          mkdir -p $ARCHROOT/usr/bin
          mkdir -p $ARCHROOT/usr/share/applications
          mkdir -p $ARCHROOT/usr/share/icons/hicolor/256x256/apps

          cp -r $BUNDLE/* $ARCHROOT/opt/htcommander/
          printf '#!/bin/bash\nexec /opt/htcommander/htcommander-x "$@"\n' > $ARCHROOT/usr/bin/htcommander
          chmod +x $ARCHROOT/usr/bin/htcommander

          cat > $ARCHROOT/usr/share/applications/HTCommander.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=HTCommander-X
          Comment=Cross-platform Ham Radio Commander
          Exec=/opt/htcommander/htcommander-x
          Icon=htcommander
          Terminal=false
          Type=Application
          Categories=HamRadio;Network;
          DESKTOP
          sed -i 's/^          //' $ARCHROOT/usr/share/applications/HTCommander.desktop

          if [ -f AppDir/usr/share/icons/hicolor/256x256/apps/htcommander.png ]; then
            cp AppDir/usr/share/icons/hicolor/256x256/apps/htcommander.png \
              $ARCHROOT/usr/share/icons/hicolor/256x256/apps/
          fi

          fpm -s dir -t pacman \
            -n htcommander \
            -v "$VERSION" \
            -a x86_64 \
            --description "HTCommander-X - Cross-platform Ham Radio Commander" \
            --url "https://github.com/dikei100/HTCommander-X" \
            --license "Apache-2.0" \
            --depends gtk3 \
            --depends bluez \
            -C $ARCHROOT \
            -p "htcommander-${VERSION}-1-x86_64.pkg.tar.zst"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: linux-packages
          path: |
            HTCommander-X-x86_64.AppImage
            htcommander_*.deb
            htcommander-*.rpm
            htcommander-*.pkg.tar.zst

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Flutter
        uses: subosito/flutter-action@e938fdf56512cc96ef2f93601a5a40bde3801046 # v2.19.0
        with:
          channel: stable

      - name: Build Windows release
        working-directory: htcommander_flutter
        run: |
          flutter pub get
          flutter build windows --release

      - name: Create Windows zip
        run: |
          cd htcommander_flutter/build/windows/x64/runner/Release
          7z a $env:GITHUB_WORKSPACE/HTCommander-X-win-x64.zip *

      - name: Upload Windows artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: windows-package
          path: HTCommander-X-win-x64.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          generate_release_notes: true
          files: |
            linux-packages/HTCommander-X-x86_64.AppImage
            linux-packages/htcommander_*.deb
            linux-packages/htcommander-*.rpm
            linux-packages/htcommander-*.pkg.tar.zst
            windows-package/HTCommander-X-win-x64.zip
