name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libfuse2 imagemagick wget

      - name: Publish Linux x64
        run: |
          dotnet publish HTCommander.Desktop/HTCommander.Desktop.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=false \
            -p:PublishTrimmed=false \
            -o publish/linux-x64

      - name: Build AppImage
        run: |
          APPDIR=AppDir
          mkdir -p $APPDIR/usr/bin
          mkdir -p $APPDIR/usr/share/applications
          mkdir -p $APPDIR/usr/share/icons/hicolor/256x256/apps

          # Copy published files
          cp -r publish/linux-x64/* $APPDIR/usr/bin/

          # Desktop file
          cp packaging/linux/HTCommander.desktop $APPDIR/usr/share/applications/
          cp packaging/linux/HTCommander.desktop $APPDIR/

          # Icon
          convert src/HTCommander.ico[0] -resize 256x256 $APPDIR/usr/share/icons/hicolor/256x256/apps/htcommander.png
          cp $APPDIR/usr/share/icons/hicolor/256x256/apps/htcommander.png $APPDIR/htcommander.png
          cp $APPDIR/usr/share/icons/hicolor/256x256/apps/htcommander.png $APPDIR/.DirIcon

          # AppRun
          printf '#!/bin/bash\nSELF=$(readlink -f "$0")\nHERE=${SELF%%/*}\nexport PATH="${HERE}/usr/bin:${PATH}"\nexport LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"\nexec "${HERE}/usr/bin/HTCommander.Desktop" "$@"\n' > $APPDIR/AppRun
          chmod +x $APPDIR/AppRun

          # Download appimagetool
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          # Build AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage $APPDIR HTCommander-X-x86_64.AppImage

      - name: Build .deb
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DEBDIR="htcommander_${VERSION}_amd64"

          mkdir -p $DEBDIR/opt/htcommander
          mkdir -p $DEBDIR/DEBIAN
          mkdir -p $DEBDIR/usr/bin
          mkdir -p $DEBDIR/usr/share/applications
          mkdir -p $DEBDIR/usr/share/icons/hicolor/256x256/apps

          # Copy published files
          cp -r publish/linux-x64/* $DEBDIR/opt/htcommander/

          # Control file
          cat > $DEBDIR/DEBIAN/control << 'CTRL'
          Package: htcommander
          Section: hamradio
          Priority: optional
          Architecture: amd64
          Depends: libportaudio2, bluez
          Recommends: espeak-ng
          Maintainer: HTCommander-X
          Description: HTCommander-X - Cross-platform Ham Radio Commander
           HTCommander-X is a cross-platform application for controlling
           Bluetooth-enabled ham radio handhelds. Supports UV-PRO, VR-N75,
           VR-N76, VR-N7500, and other compatible radios.
          Homepage: https://github.com/dikei100/HTCommander-X
          CTRL
          # Fix indentation and insert version
          sed -i 's/^          //' $DEBDIR/DEBIAN/control
          sed -i "2i Version: ${VERSION}" $DEBDIR/DEBIAN/control

          # Launcher script
          printf '#!/bin/bash\nexec /opt/htcommander/HTCommander.Desktop "$@"\n' > $DEBDIR/usr/bin/htcommander
          chmod +x $DEBDIR/usr/bin/htcommander

          # Desktop file
          cp packaging/linux/HTCommander.desktop $DEBDIR/usr/share/applications/
          sed -i "s|Exec=HTCommander.Desktop|Exec=/opt/htcommander/HTCommander.Desktop|" \
              $DEBDIR/usr/share/applications/HTCommander.desktop

          # Icon
          if [ -f AppDir/usr/share/icons/hicolor/256x256/apps/htcommander.png ]; then
            cp AppDir/usr/share/icons/hicolor/256x256/apps/htcommander.png \
              $DEBDIR/usr/share/icons/hicolor/256x256/apps/
          fi

          dpkg-deb --build $DEBDIR "htcommander_${VERSION}_amd64.deb"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            HTCommander-X-x86_64.AppImage
            htcommander_*.deb

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish Windows x64
        run: |
          dotnet publish HTCommander.Desktop/HTCommander.Desktop.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:PublishTrimmed=false `
            -o publish/win-x64

      - name: Create zip
        run: Compress-Archive -Path publish/win-x64/* -DestinationPath HTCommander-X-win-x64.zip

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: HTCommander-X-win-x64.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            linux-artifacts/HTCommander-X-x86_64.AppImage
            linux-artifacts/htcommander_*.deb
            windows-artifacts/HTCommander-X-win-x64.zip
